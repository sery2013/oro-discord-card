<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Getoro Discord Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Создать карточку участника Getoro</h1>
    <form id="cardForm">
      <label>Ваш ник в Discord:</label>
      <input type="text" id="username" required />

      <label>Дата присоединения:</label>
      <input type="date" id="joinDate" required />

      <label>Загрузите вашу аватарку:</label>
      <input type="file" id="avatarUpload" accept="image/*" required />

      <label>Выберите вашу роль:</label>
      <select id="roleSelect" required></select>

      <button type="submit">Сгенерировать карточку</button>
    </form>

    <div id="cardPreview" class="card" style="display:none;">
      <!-- Используем прямые ссылки -->
      <img src="https://ltdfoto.ru/images/2026/03/12/ORO.png" alt="Логотип Getoro" class="logo" />
      <div class="avatar-container">
        <img id="previewAvatar" src="" alt="Ваш аватар" />
      </div>
      <div class="info-block">
        <h2 id="previewUsername"></h2>
        <p>Присоединился: <span id="previewJoinDate"></span></p>
        <p>Роль: <span id="previewRole"></span></p>
      </div>
      <img src="https://ltdfoto.ru/images/2026/03/12/qr.png" alt="QR-код" class="qr-code" />
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
