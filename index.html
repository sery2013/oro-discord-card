<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ORO Discord Card Generator</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    
    <!-- Control Panel -->
    <div class="controls-panel gradient-border">
      <div class="logo-section">
        <img src="https://ltdfoto.ru/images/2026/03/12/ORO.png" alt="ORO Logo" class="project-logo" />
        <h1>ORO Member Card</h1>
      </div>

      <div class="form-group">
        <label>🖼️ Avatar</label>
        <input type="file" id="avatarInput" accept="image/*" />
        <div class="avatar-preview" id="avatarPreview">
          <img src="https://ltdfoto.ru/images/2026/03/12/ORO.png" alt="Preview" />
        </div>
      </div>

      <div class="form-group">
        <label>👤 Discord Username</label>
        <input type="text" id="username" placeholder="user#1234" maxlength="32" />
      </div>

      <div class="form-group">
        <label>📅 Join Date</label>
        <input type="date" id="joinDate" />
      </div>

      <div class="form-group">
        <label>🎭 Roles (select multiple)</label>
        <div class="roles-grid" id="rolesContainer">
          <!-- Roles injected via JS -->
        </div>
      </div>

      <div class="form-group">
        <label>🔗 QR Code (upload image)</label>
        <input type="file" id="qrInput" accept="image/*" />
        <div class="qr-preview" id="qrPreview">
          <img src="https://ltdfoto.ru/images/2026/03/12/qr.png" alt="QR" />
        </div>
      </div>

      <button class="btn-generate gradient-btn" id="generateBtn">
        ✨ Generate Card
      </button>
      <button class="btn-download gradient-btn" id="downloadBtn" disabled>
        💾 Download PNG
      </button>
    </div>

    <!-- Card Preview -->
    <div class="card-preview-section">
      <div class="discord-card gradient-border" id="discordCard">
        
        <!-- Header with Logo -->
        <div class="card-header">
          <img src="https://ltdfoto.ru/images/2026/03/12/ORO.png" alt="ORO" class="card-logo" />
          <span class="oro-badge">ORO MEMBER</span>
        </div>

        <!-- Main Content -->
        <div class="card-body">
          
          <!-- Avatar + Name -->
          <div class="profile-section gradient-frame">
            <div class="avatar-wrapper">
              <img src="https://ltdfoto.ru/images/2026/03/12/ORO.png" alt="Avatar" class="user-avatar" id="cardAvatar" />
              <div class="avatar-glow"></div>
            </div>
            <div class="user-info">
              <h2 class="username" id="cardUsername">@username</h2>
              <p class="join-date" id="cardJoinDate">Joined: —</p>
            </div>
          </div>

          <!-- Roles -->
          <div class="roles-section gradient-frame">
            <h3>Roles</h3>
            <div class="roles-list" id="cardRoles">
              <span class="role-tag empty">Select roles</span>
            </div>
          </div>

          <!-- QR Code -->
          <div class="qr-section gradient-frame">
            <h3>Profile</h3>
            <div class="qr-code">
              <img src="https://ltdfoto.ru/images/2026/03/12/qr.png" alt="QR" id="cardQR" />
            </div>
          </div>

        </div>

        <!-- Footer -->
        <div class="card-footer">
          <span class="powered-by">Powered by <strong>ORO</strong></span>
          <span class="card-id" id="cardId">#ORO-0000</span>
        </div>

        <!-- Decorative Elements -->
        <div class="gradient-overlay"></div>
        <div class="particle-effect"></div>
      </div>
    </div>

  </div>

  <!-- html2canvas for PNG export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
